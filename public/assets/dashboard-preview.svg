<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc"/>
  
  <!-- Phone Frame -->
  <rect x="250" y="50" width="300" height="500" rx="30" fill="#1f2937" stroke="#374151" stroke-width="2"/>
  <rect x="270" y="70" width="260" height="460" rx="20" fill="#ffffff"/>
  
  <!-- Status Bar -->
  <rect x="270" y="70" width="260" height="40" rx="20" fill="#2563eb"/>
  <text x="400" y="95" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="14" font-weight="600">TillDash</text>
  
  <!-- Scanner Area -->
  <rect x="290" y="130" width="220" height="150" rx="10" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="400" y="190" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="12">Scan Product</text>
  <text x="400" y="210" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="12">Barcode Here</text>
  
  <!-- Barcode Icon -->
  <rect x="380" y="220" width="40" height="30" fill="none" stroke="#64748b" stroke-width="2"/>
  <line x1="385" y1="225" x2="385" y2="245" stroke="#64748b" stroke-width="1"/>
  <line x1="390" y1="225" x2="390" y2="245" stroke="#64748b" stroke-width="2"/>
  <line x1="395" y1="225" x2="395" y2="245" stroke="#64748b" stroke-width="1"/>
  <line x1="400" y1="225" x2="400" y2="245" stroke="#64748b" stroke-width="2"/>
  <line x1="405" y1="225" x2="405" y2="245" stroke="#64748b" stroke-width="1"/>
  <line x1="410" y1="225" x2="410" y2="245" stroke="#64748b" stroke-width="2"/>
  <line x1="415" y1="225" x2="415" y2="245" stroke="#64748b" stroke-width="1"/>
  
  <!-- Cart Items -->
  <rect x="290" y="300" width="220" height="120" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="300" y="320" fill="#1f2937" font-family="Inter, sans-serif" font-size="14" font-weight="600">Cart Items</text>
  
  <!-- Item 1 -->
  <rect x="300" y="330" width="30" height="20" rx="4" fill="#ddd6fe"/>
  <text x="340" y="345" fill="#374151" font-family="Inter, sans-serif" font-size="12">Apple Juice</text>
  <text x="480" y="345" text-anchor="end" fill="#059669" font-family="Inter, sans-serif" font-size="12" font-weight="600">$3.99</text>
  
  <!-- Item 2 -->
  <rect x="300" y="355" width="30" height="20" rx="4" fill="#fed7d7"/>
  <text x="340" y="370" fill="#374151" font-family="Inter, sans-serif" font-size="12">Bread Loaf</text>
  <text x="480" y="370" text-anchor="end" fill="#059669" font-family="Inter, sans-serif" font-size="12" font-weight="600">$2.49</text>
  
  <!-- Item 3 -->
  <rect x="300" y="380" width="30" height="20" rx="4" fill="#bfdbfe"/>
  <text x="340" y="395" fill="#374151" font-family="Inter, sans-serif" font-size="12">Milk 1L</text>
  <text x="480" y="395" text-anchor="end" fill="#059669" font-family="Inter, sans-serif" font-size="12" font-weight="600">$4.29</text>
  
  <!-- Total -->
  <line x1="300" y1="405" x2="490" y2="405" stroke="#e2e8f0" stroke-width="1"/>
  <text x="300" y="420" fill="#1f2937" font-family="Inter, sans-serif" font-size="14" font-weight="700">Total</text>
  <text x="480" y="420" text-anchor="end" fill="#1f2937" font-family="Inter, sans-serif" font-size="14" font-weight="700">$10.77</text>
  
  <!-- Pay Button -->
  <rect x="290" y="440" width="220" height="50" rx="25" fill="#2563eb"/>
  <text x="400" y="470" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="16" font-weight="600">Pay with M-Pesa</text>
  
  <!-- Features around phone -->
  <!-- Left side features -->
  <circle cx="150" cy="200" r="40" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="150" y="205" text-anchor="middle" fill="#2563eb" font-family="Inter, sans-serif" font-size="24">📱</text>
  <text x="150" y="260" text-anchor="middle" fill="#374151" font-family="Inter, sans-serif" font-size="12" font-weight="600">Scan & Go</text>
  
  <circle cx="150" cy="350" r="40" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
  <text x="150" y="355" text-anchor="middle" fill="#059669" font-family="Inter, sans-serif" font-size="24">💳</text>
  <text x="150" y="410" text-anchor="middle" fill="#374151" font-family="Inter, sans-serif" font-size="12" font-weight="600">Mobile Pay</text>
  
  <!-- Right side features -->
  <circle cx="650" cy="200" r="40" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="650" y="205" text-anchor="middle" fill="#f59e0b" font-family="Inter, sans-serif" font-size="24">🛡️</text>
  <text x="650" y="260" text-anchor="middle" fill="#374151" font-family="Inter, sans-serif" font-size="12" font-weight="600">Secure</text>
  
  <circle cx="650" cy="350" r="40" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="650" y="355" text-anchor="middle" fill="#ec4899" font-family="Inter, sans-serif" font-size="24">⚡</text>
  <text x="650" y="410" text-anchor="middle" fill="#374151" font-family="Inter, sans-serif" font-size="12" font-weight="600">Fast</text>
</svg>
